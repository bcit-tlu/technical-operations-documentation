replicaCount: 1

image:
  repository: ghcr.io/bcit-tlu/technical-operations-documentation/tech-ops-docs
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tech-ops-docs.ltc.bcit.ca
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# ── High-availability / topology spreading ────────────────────
# When enabled, adds a required pod anti-affinity rule so that no two
# replicas land in the same topology zone (e.g. datacenter).
# Requires nodes to be labeled with the chosen topologyKey.
# NOTE: replicaCount must not exceed the number of distinct zones,
# otherwise excess pods will remain Pending (hard scheduling constraint).
zoneAntiAffinity:
  enabled: false
  topologyKey: topology.kubernetes.io/zone

nodeSelector: {}
tolerations: []
affinity: {}
