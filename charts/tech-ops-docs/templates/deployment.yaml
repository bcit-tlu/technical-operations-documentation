apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tech-ops-docs.fullname" . }}
  labels:
    {{- include "tech-ops-docs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tech-ops-docs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tech-ops-docs.labels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := deepCopy (.Values.affinity | default dict) }}
      {{- if .Values.zoneAntiAffinity.enabled }}
        {{- $zoneRule := dict "labelSelector" (dict "matchLabels" (include "tech-ops-docs.selectorLabels" . | fromYaml)) "topologyKey" .Values.zoneAntiAffinity.topologyKey }}
        {{- $existing := list }}
        {{- if hasKey $aff "podAntiAffinity" }}
          {{- $existing = $aff.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution | default list }}
        {{- end }}
        {{- $merged := dict "podAntiAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" (append $existing $zoneRule)) }}
        {{- $aff = mustMergeOverwrite $aff $merged }}
      {{- end }}
      {{- if $aff }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
